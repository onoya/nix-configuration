# Encrypted secrets managed by sops-nix
#
# Setup instructions:
# 1. Generate an age key: age-keygen -o ~/.config/sops/age/keys.txt
# 2. Get the public key: age-keygen -y ~/.config/sops/age/keys.txt
# 3. Add the public key to .sops.yaml
# 4. Encrypt this file: sops secrets/secrets.yaml
#
# Example secrets:
# github_token: your-token-here
# openai_api_key: your-key-here
