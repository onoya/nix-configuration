# Encrypted secrets managed by sops-nix
#
# First-time setup:
#   1. Generate an age key:       age-keygen -o ~/.config/sops/age/keys.txt
#   2. BACK UP the key file in your password manager (1Password, Bitwarden, etc.)
#   3. Get the public key:         age-keygen -y ~/.config/sops/age/keys.txt
#   4. Add the public key to .sops.yaml (replace the placeholder)
#   5. Encrypt this file:          sops secrets/secrets.yaml
#
# On a new/reformatted machine:
#   1. Restore ~/.config/sops/age/keys.txt from your password manager
#   2. Rebuild the system — sops-nix will decrypt secrets automatically
#
# Example secrets (add your own when editing with sops):
# github_token: your-token-here
# openai_api_key: your-key-here
